<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12151a" />
    <title>LucidShell</title>
    <script>
      try {
        const rawSettings =
          localStorage.getItem("lucidshell.settings.v2") ||
          localStorage.getItem("lucidshell.settings.v1");
        const theme = rawSettings ? JSON.parse(rawSettings)?.appearance?.theme : undefined;
        document.documentElement.dataset.theme = theme === "light" ? "light" : "dark";
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #12151a;
      }

      body {
        min-width: 960px;
        min-height: 640px;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
