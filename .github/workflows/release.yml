name: Build and Release

on:
  push:
    # 当 push 到 main 或 develop 分支时触发
    branches: [ main, develop ]
    # 当 push 包含版本标签时（例如 v0.1.2），也会触发
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  # 允许手动触发工作流
  workflow_dispatch:

env:
  # 定义 Node.js 和 Rust 的版本
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # 任务1：代码检查和前端构建验证
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2

      - name: 安装前端依赖
        run: npm ci

      # 前端代码检查 (需要安装 eslint)
      - name: 运行 ESLint
        run: npx eslint . --ext .vue,.js,.jsx,.cjs,.mjs,.ts,.tsx,.cts,.mts --fix --ignore-path .gitignore || true

      # TypeScript 类型检查
      - name: TypeScript 类型检查
        run: npx vue-tsc --noEmit

      # Rust 代码格式化检查
      - name: Rustfmt 检查
        run: |
          cd src-tauri
          cargo fmt --all -- --check || echo "⚠️ Rustfmt 检查发现问题，请运行 'cargo fmt' 修复"

      # Rust Clippy 代码检查 (允许警告，但不会失败)
      - name: Clippy 检查
        run: |
          cd src-tauri
          cargo clippy -- -D warnings

  # 任务2：跨平台构建和测试
  build:
    name: Build on ${{ matrix.os }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 如果一个平台构建失败，继续其他平台
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_name: 'LucidShell_*.exe'
            artifact_path: 'src-tauri/target/release/bundle/nsis/*.exe'
          - os: macos-latest
            target: darwin
            artifact_name: 'LucidShell_*.app'
            artifact_path: 'src-tauri/target/release/bundle/macos/*.app'
          - os: ubuntu-latest
            target: linux
            artifact_name: 'LucidShell_*.AppImage'
            artifact_path: 'src-tauri/target/release/bundle/appimage/*.AppImage'

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 安装 Node.js 和 Rust (步骤同 check 任务)
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 安装系统依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            pkg-config \
            libglib2.0-dev \
            libglib2.0-dev-bin \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            at-spi2-core \
            libudev-dev
            
          # 设置 PKG_CONFIG_PATH 环境变量
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: 安装前端依赖
        run: npm ci

      # 关键：同步版本号（项目文档已明确构建前会自动同步）
      - name: 版本同步验证
        run: node scripts/sync-version.js || echo "版本同步脚本不存在或执行失败，请检查"

      # 执行 Tauri 构建
      - name: Tauri 构建
        run: npm run tauri build

      # 上传构建产物作为工作流 artifact
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LucidShell-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}

  # 任务3：创建 GitHub Release (仅在推送标签时触发)
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # 仅在推送版本标签时执行
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # 允许创建 Release
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出下载的产物（调试用）
        run: ls -R artifacts

      - name: 创建 GitHub Release 并上传资产
        uses: softprops/action-gh-release@v1
        with:
          # 生成 release 说明（可选，使用默认标题和说明）
          name: ${{ github.ref_name }}
          body: |
            ## LucidShell ${{ github.ref_name }}
            
            该版本由 CI 自动构建。请下载适用于您平台的文件。
            
            ### ⚠️ 注意
            当前项目处于早期 Beta 阶段，请先在非关键环境中验证。
            
            ### 平台文件说明
            - **Windows**: 下载 `LucidShell_*.exe` (NSIS 安装包)
            - **macOS**: 下载 `LucidShell_*.app` (应用包)
            - **Linux**: 下载 `LucidShell_*.AppImage` (可执行镜像)
          files: |
            artifacts/**/*.exe
            artifacts/**/*.app
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
