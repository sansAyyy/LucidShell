# .github/workflows/ci.yml
name: Build & Test

on:
  push:
    branches: [ "main", "develop" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # 1. 代码风格与类型检查阶段 (快速失败)
  lint:
    name: Lint (Frontend & Backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 前端检查
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript & Vue Lint
        run: npm run lint  # 假设 package.json 中有 lint 脚本，若无请增加

      # Rust 检查
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  # 2. 构建测试 (确保各平台能正常编译)
  build:
    name: Build on ${{ matrix.os }}
    needs: [lint]  # 只有lint通过后才构建
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台继续
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_prefix: lucidshell-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_prefix: lucidshell-windows
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_prefix: lucidshell-macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_prefix: lucidshell-macos-apple-silicon

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Tauri 依赖: Linux 需要额外系统库
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Node 与 前端构建
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend (Vue)
        run: npm run build

      # Rust 与 Tauri 构建
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # 上传构建产物 (便于调试或手动下载)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
            !src-tauri/target/${{ matrix.target }}/release/bundle/*.symbols.*  # 忽略符号文件减小体积

  # 3. (可选) 自动发布 GitHub Release
  # 当推送 tag 时，会自动从 build job 的产物创建 Release 并上传安装包
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate release notes
        run: |
          # 简单生成 CHANGELOG 片段，实际可按需使用 github-release-notes
          echo "## 更新内容" > RELEASE_NOTES.md
          echo "请参考 [Beta 测试清单](docs/beta-test-checklist.md) 和 [已知问题](docs/known-issues.md)" >> RELEASE_NOTES.md
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.app.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
          fail_on_unmatched_files: false
          draft: false
          prerelease: true   # Beta版本建议标记为预发布
